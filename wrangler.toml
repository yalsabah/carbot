# Cloudflare Pages — Functions configuration.
#
# We deliberately declare the R2 binding here (rather than only in the dashboard)
# because the dashboard UI has a long-standing bug where it serializes an empty
# `jurisdiction` field on R2 bindings, which wrangler rejects with:
#   "binding MODELS_BUCKET of type r2_bucket contains an invalid jurisdiction"
#
# When a wrangler.toml is present at the project root, Pages uses it as the
# source of truth for bindings during the build — no jurisdiction field, no
# error. Dashboard env vars (CLAUDE_API_KEY, MODELS_PUBLIC_BASE, etc.) still
# come from the dashboard; only bindings declared here are overridden.

name = "vincritiq"
compatibility_date = "2024-12-01"
pages_build_output_dir = "build"

# R2 — GLB asset library. The bucket is in WNAM (location hint, not a
# jurisdiction); intentionally omit `jurisdiction = "..."`.
[[r2_buckets]]
binding = "MODELS_BUCKET"
bucket_name = "vincritiq-models"

# Build-time environment variables. CRA bakes these into the client bundle
# at build time via process.env.REACT_APP_*.
#
# Why these live here instead of in the Pages dashboard: Cloudflare's build
# step wasn't injecting the dashboard's REACT_APP_FIREBASE_* plaintext vars
# into `npm run build`, so every reference resolved to undefined and Firebase
# threw `auth/invalid-api-key` on init. Declaring them here guarantees they
# reach CRA regardless of dashboard quirks.
#
# IMPORTANT — only public-by-design values go here. The Firebase web config
# is intentionally public (security is enforced by Firestore Security Rules
# and App Check, not by hiding these IDs). Real secrets — Claude API key,
# Tripo3D key, VinAudit key, Vincario key/secret — stay in the Cloudflare
# dashboard as encrypted Secrets and are NEVER added to this file.
[vars]
REACT_APP_FIREBASE_API_KEY             = "AIzaSyAS5V7JjUDUdU8BhMN9cUj13x9hGOAvcOg"
REACT_APP_FIREBASE_AUTH_DOMAIN         = "carbot-77c32.firebaseapp.com"
REACT_APP_FIREBASE_PROJECT_ID          = "carbot-77c32"
REACT_APP_FIREBASE_STORAGE_BUCKET      = "carbot-77c32.firebasestorage.app"
REACT_APP_FIREBASE_MESSAGING_SENDER_ID = "639263980314"
REACT_APP_FIREBASE_APP_ID              = "1:639263980314:web:96db6e565c6b18bd4d8aa3"
REACT_APP_FIREBASE_MEASUREMENT_ID      = "G-JJ0S85KE2D"
GENERATE_SOURCEMAP                     = "false"
