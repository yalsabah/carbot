name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: carbot
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: carbot/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: CI=true npm run build
        env:
          # Build-time vars CRA needs to compile (any non-empty placeholder works
          # here — the bundle just needs them to be defined). Real values come
          # from Cloudflare Pages at deploy time.
          REACT_APP_FIREBASE_API_KEY: ci-placeholder
          REACT_APP_FIREBASE_AUTH_DOMAIN: ci-placeholder
          REACT_APP_FIREBASE_PROJECT_ID: ci-placeholder
          REACT_APP_FIREBASE_STORAGE_BUCKET: ci-placeholder
          REACT_APP_FIREBASE_MESSAGING_SENDER_ID: ci-placeholder
          REACT_APP_FIREBASE_APP_ID: ci-placeholder
